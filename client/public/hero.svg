<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ccfbf1"/>
      <stop offset="100%" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="960" height="256" fill="url(#bg)"/>
  <!-- decorative circles -->
  <circle cx="820" cy="60" r="140" fill="#14b8a6" fill-opacity="0.12"/>
  <circle cx="900" cy="200" r="80" fill="#0d9488" fill-opacity="0.1"/>
  <circle cx="100" cy="220" r="100" fill="#2dd4bf" fill-opacity="0.1"/>
  <!-- pulse ring -->
  <circle cx="480" cy="128" r="72" stroke="#0d9488" stroke-width="2" stroke-opacity="0.2" fill="none"/>
  <circle cx="480" cy="128" r="48" stroke="#0d9488" stroke-width="2" stroke-opacity="0.3" fill="none"/>
  <!-- heart-rate line -->
  <polyline
    points="340,128 390,128 410,88 430,168 450,108 470,148 490,128 560,128 580,80 600,176 620,128 640,128"
    stroke="#0f766e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.6"/>
  <!-- label -->
  <text x="480" y="218" font-family="Inter,ui-sans-serif,system-ui,sans-serif" font-size="13" fill="#0f766e" fill-opacity="0.7" text-anchor="middle" letter-spacing="0.08em">RECOVERY PLAN</text>
</svg>
